<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bouncing Box</title>
    <script src="jquery.min.js"></script>
    <style>
      body {
        overflow: hidden;
          
      }

      .box {
        width: 70px;
        height: 70px;
        background-color: rgb(217, 30, 217);
        font-size: 300%;
        text-align: center;
        user-select: none;
        display: block;
        position: absolute;
        top: 100px;
        /* Change me! */
        left: 20px;
      }

      .board {
        height: 100vh;
        animation: bgChange 8s  ease-in-out infinite ;
      }

      @keyframes bgChange {
        0% { background-color: rgb(255, 0, 0); }
        10% { background-color: rgb(255, 128, 0); }
        20% { background-color: rgb(255, 221, 0); }
        30% { background-color: rgb(43, 255, 0); }
        40% { background-color: rgb(0, 255, 238); }
        50% { background-color:rgb(0, 166, 255); }
        60% { background-color: rgb(21, 0, 255); }
        70% { background-color: rgb(170, 0, 255); }
        80% { background-color: rgb(255, 0, 247); }
        90% { background-color:rgb(255, 0, 157); }
        100% { background-color: rgb(255, 0, 0); }
      }
    </style>
    <!-- 	<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script> -->
  </head>

  <body class="board">
    <!-- HTML for the box -->
    <div class="box">?</div>

    <script>
      (function () {
        "use strict";
        /* global jQuery */

        //////////////////////////////////////////////////////////////////
        /////////////////// SETUP DO NOT DELETE //////////////////////////
        //////////////////////////////////////////////////////////////////

        var box = jQuery(".box"); // reference to the HTML .box element
        var board = jQuery(".board"); // reference to the HTML .board element
        var boardWidth = board.width(); // the maximum X-Coordinate of the screen
        var boardHeight = jQuery(window).height();
        

        // update the boardWidth variable when the window is resized
        jQuery(window).on("resize", function () {
          boardWidth = board.width();
        });

        // Every 50 milliseconds, call the update Function (see below)
        setInterval(update, 50);

        // Every time the box is clicked, call the handleBoxClick Function (see below)
        box.on("click", handleBoxClick);

        // moves the Box to a new position on the screen along the X-Axis
        function moveBoxTo(newPositionX, newPositionY) {
          box.css("left", newPositionX);
          box.css("top", newPositionY)
        }

        function getRandomColor(r, g, b) {
          return colorStr = "rgb(" + r + ", " + g + ", " + b + ")"
        }

        // changes the text displayed on the Box
        function changeBoxText(newText, textColor) {
          box.text(newText);
        }



        //////////////////////////////////////////////////////////////////
        /////////////////// YOUR CODE BELOW HERE /////////////////////////
        //////////////////////////////////////////////////////////////////

        // TODO 2 - Variable declarations
        var positionX = 0
        var points = 0
        var positionY = 0
        var speedY = 10
        var speed = 10
        var coinFlipX
        var coinFlipY
        var color1 
        var color2 
        var color3 
        var antiColor1 = 255 - color1
        var antiColor2 = 255 - color2
        var antiColor3 = 255 - color3
        var colorStr = "rgb("+ color1 +", " + color2 + ", " + color3 + ")";
        




        /**
         * This Function will be called 20 times/second.
         * Each time it is called, it should move the Box to a new location.
         * If the box drifts off the screen, turn it around!
         */
        function update() {
          moveBoxTo(positionX, positionY)
          positionX += speed
          if (positionX > boardWidth - 70) {
            speed *= -1
          }
          else if (positionX < 0) {
            speed *= -1
          }
          positionY += speedY;
          if (positionY > boardHeight - 50){
            speedY *= -1
          }
          else if (positionY < 0){
            speedY *= -1
          }
          


        

          
        }

        /**
         * This Function will be called each time the box is clicked.
         * Each time it is called, it should perform each of the following actions:
         * - increase the points total
         * - increase the speed
         * - move the box to the left side of the screen.
         */
        function handleBoxClick() {
          positionX = Math.random() * 600
          positionY = Math.random() * 400
          color1 = Math.random() * 255
          color2 = Math.random() * 255
          color3 = Math.random() * 255
          getRandomColor(color1, color2, color3)
          box.css("background-color", colorStr)
          changeBoxText(points)
          points += 1
          speed = 3 * points + 10
          speedY = 3 * points + 10
          coinFlipX = Math.random()
          if (coinFlipX > 0.5){
            speed *= -1
          }
          coinFlipY = Math.random()
          if (coinFlipY > 0.5) {
            speedY *= -1
          }




        }


        
      })();
    </script>
  </body>
</html>
